name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying Gistify to VPS ==="
            
            # Navigate to app directory
            cd ${{ secrets.VPS_PATH || '/var/www/gistify' }}
            
            # Pull latest code
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Build
            npm run build
            
            # Restart based on deployment method
            if command -v pm2 &> /dev/null; then
              pm2 restart gistify || pm2 start dist/index.js --name gistify
            elif command -v docker &> /dev/null && [ -f docker-compose.yml ]; then
              docker compose up -d --build
            elif command -v docker &> /dev/null && [ -f Dockerfile ]; then
              docker build -t gistify .
              docker stop gistify || true
              docker rm gistify || true
              docker run -d \
                --name gistify \
                -p ${{ secrets.VPS_PORT || '3000' }}:3000 \
                -e NODE_ENV=production \
                -e PORT=3000 \
                -e MIDAS_PIPELINE_SOURCE_FILE=/data/midas/midas_signals.json \
                -v /srv/gistify/midas:/data/midas:ro \
                gistify
            elif command -v systemctl &> /dev/null; then
              sudo systemctl restart gistify
            else
              # Fallback: kill existing node process and restart
              pkill -f "node dist/index.js" || true
              nohup node dist/index.js > /dev/null 2>&1 &
            fi
            
            echo "=== Deploy completed ==="
