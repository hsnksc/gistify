services:
  gistify:
    image: hsanksc/gistify:latest
    container_name: gistify
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MIDAS_PIPELINE_SOURCE_FILE: /data/midas/midas_signals.json
      BILLING_DB_PATH: /app/data/billing.sqlite
      GISTIFY_DB_PATH: /app/data/gistify.sqlite
      GIT_SHA: ${GIT_SHA:-}
      GIT_BRANCH: ${GIT_BRANCH:-}
      REPORT_ADMIN_SECRET: ${REPORT_ADMIN_SECRET:-}
    volumes:
      - /srv/gistify/midas:/data/midas:ro
      - /srv/gistify/data:/app/data
    restart: unless-stopped
