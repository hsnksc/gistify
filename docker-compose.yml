services:
  gistify:
    image: hsnksc/gistify:latest
    container_name: gistify
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MIDAS_PIPELINE_SOURCE_FILE: /data/midas/midas_signals.json
      BILLING_DB_PATH: /app/data/billing.sqlite
      GISTIFY_DB_PATH: /app/data/gistify.sqlite
      GIT_SHA: ${GIT_SHA:-}
      GIT_BRANCH: ${GIT_BRANCH:-}
      REPORT_ADMIN_SECRET: ${REPORT_ADMIN_SECRET:-}
      OPTIONS_DATA_PROVIDER: ${OPTIONS_DATA_PROVIDER:-}
      THETADATA_API_KEY: ${THETADATA_API_KEY:-}
      THETADATA_BASE_URL: ${THETADATA_BASE_URL:-http://127.0.0.1:25503/v3}
      THETADATA_MAX_TICKERS: ${THETADATA_MAX_TICKERS:-8}
      THETADATA_MAX_DTE: ${THETADATA_MAX_DTE:-60}
      THETADATA_STRIKE_RANGE: ${THETADATA_STRIKE_RANGE:-15}
      THETADATA_REQUEST_GAP_MS: ${THETADATA_REQUEST_GAP_MS:-3100}
    volumes:
      - /srv/gistify/midas:/data/midas:ro
      - /srv/gistify/data:/app/data
    restart: unless-stopped
