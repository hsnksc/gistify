/* GISTIFY FLOW — Unified Dark Theme */
:root{--gf-bg:#050c1b;--gf-elev:#0a1628;--gf-card:#0d1b2a;--gf-border:#1e3a5f;--gf-border-subtle:rgba(30,58,95,.5);--gf-text:#e2e8f0;--gf-muted:#94a3b8;--gf-accent:#38bdf8;--gf-accent-dim:rgba(56,189,248,.12);--gf-success:#4ade80;--gf-success-dim:rgba(74,222,128,.12);--gf-warning:#fbbf24;--gf-warning-dim:rgba(251,191,36,.12);--gf-danger:#f87171;--gf-danger-dim:rgba(248,113,113,.12);--gf-radius:12px;--gf-font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,sans-serif;--gf-mono:'SF Mono',Monaco,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#050c1b!important;color:var(--gf-text);font-family:var(--gf-font);line-height:1.65;font-size:15px;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:28px 18px}

.meta-pill.neu{color:var(--gf-warning);border-color:rgba(251,191,36,.35)}
.meta-pill.info{color:var(--gf-accent);border-color:rgba(56,189,248,.35)}
.section-head{background:var(--gf-elev);border:1px solid var(--gf-border);border-radius:var(--gf-radius);overflow:hidden;cursor:pointer;user-select:none;transition:background .15s;display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.section-head:hover{background:var(--gf-card)}
.section-title{font-size:1.05rem;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--gf-text);margin:0}
.icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:var(--gf-accent);transition:transform .2s}
.section-head.collapsed .icon{transform:rotate(-90deg)}
.section-body{padding:18px;display:none}
.section-head:not(.collapsed) + .section-body{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}

.card:hover{transform:translateY(-1px);border-color:rgba(56,189,248,.25)}
.card-label{font-size:0.75rem;color:var(--gf-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.card-value{font-size:1.35rem;font-weight:700;color:var(--gf-text)}
.card-value.up{color:var(--gf-success)}
.card-value.down{color:var(--gf-danger)}
.card-value.neu{color:var(--gf-warning)}
.card-note{font-size:0.8rem;color:var(--gf-muted);margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:0.85rem;margin:10px 0}

tr:hover td{background:rgba(56,189,248,.04)}
td{font-variant-numeric:tabular-nums}
.text-right{text-align:right}
.text-center{text-align:center}
.insight-box{background:linear-gradient(135deg,var(--gf-accent-dim),rgba(56,189,248,.03));border-left:3px solid var(--gf-accent);padding:14px 16px;border-radius:0 var(--gf-radius) var(--gf-radius) 0;margin:12px 0;font-size:0.88rem}
.insight-box strong{color:var(--gf-accent)}

.insight-box.warn strong{color:var(--gf-warning)}
.insight-box.danger{border-left-color:var(--gf-danger);background:linear-gradient(135deg,var(--gf-danger-dim),rgba(248,113,113,.03))}
.insight-box.danger strong{color:var(--gf-danger)}
.insight-box.bull{border-left-color:var(--gf-success);background:linear-gradient(135deg,var(--gf-success-dim),rgba(74,222,128,.03))}
.insight-box.bull strong{color:var(--gf-success)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600;margin:2px 4px 2px 0}

.tag-orange{background:var(--gf-warning-dim);color:var(--gf-warning)}
.tag-red{background:var(--gf-danger-dim);color:var(--gf-danger)}
.tag-blue{background:var(--gf-accent-dim);color:var(--gf-accent)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:10px 0}
.kpi{background:var(--gf-card);border:1px solid var(--gf-border);border-radius:var(--gf-radius);padding:10px 12px;text-align:center}
.kpi-num{font-size:1.15rem;font-weight:700;color:var(--gf-text)}
.kpi-label{font-size:0.72rem;color:var(--gf-muted);margin-top:2px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--gf-border)}
.timeline-item{position:relative;margin-bottom:14px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--gf-card);border:2px solid var(--gf-border)}
.timeline-item.bull::before{border-color:var(--gf-success);background:var(--gf-success)}
.timeline-item.bear::before{border-color:var(--gf-danger);background:var(--gf-danger)}
.timeline-item.warn::before{border-color:var(--gf-warning);background:var(--gf-warning)}
.timeline-date{font-size:0.78rem;color:var(--gf-muted);font-weight:600}
.timeline-body{font-size:0.85rem;margin-top:3px;color:var(--gf-text)}
.h-strong{background:rgba(74,222,128,.35);color:#aff5b4}

.h-good{background:rgba(74,222,128,.2);color:#aff5b4}
