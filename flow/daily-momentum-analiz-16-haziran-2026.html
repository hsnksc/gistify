<script>
/* ─── CONVERTER CONFIG & PARSING ─────────────────────────── */
const renderer = new marked.Renderer();

// Customizing Markdown headings to cyber segment style
renderer.heading = function(text, level) {
  const escapedText = text.toLowerCase().replace(/[^\w]+/g, '-');
  if (level === 1) {
    return `
      <div class="section-head">
        <span class="section-num">0${Math.floor(Math.random() * 9) + 1}</span>
        <h2 class="section-title" id="${escapedText}">${text}</h2>
      </div>
    `;
  }
  return `<h3 class="chart-title" style="margin-top:28px; margin-bottom:12px; font-size:1.1rem; color:var(--txt);" id="${escapedText}">${text}</h3>`;
};

// Customizing markdown tables to siber-finans table wraps
renderer.table = function(header, body) {
  return `
    <div class="table-wrap">
      <table>
        <thead>${header}</thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  `;
};

// Customizing blockquotes to themed panel containers
renderer.blockquote = function(quote) {
  return `
    <div class="disclaimer" style="margin: 24px 0;">
      ${quote}
    </div>
  `;
};

// Customizing lists
renderer.list = function(body, ordered) {
  const tag = ordered ? 'ol' : 'ul';
  return `<${tag} style="margin: 16px 0; padding-left: 24px; color: var(--txt-muted); font-size: 0.88rem;">${body}</${tag}>`;
};
renderer.listitem = function(text) {
  return `<li style="margin-bottom: 6px;">${text}</li>`;
};

// Customizing code spans
renderer.codespan = function(code) {
  return `<code style="background: var(--card); padding: 2px 6px; border-radius: 4px; color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;">${code}</code>`;
};

marked.use({ renderer });

/* ─── CUSTOM CYBER SHORTS PARSER ────────────────────────── */
function parseCyberShortcodes(markdownText) {
  let html = markdownText;

  // Render Grids
  html = html.replace(/^\[stat-grid\]/gim, '<div class="hero-stats" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 24px 0;">');
  html = html.replace(/^\[\/stat-grid\]/gim, '</div>');

  html = html.replace(/^\[risk-grid\]/gim, '<div class="risk-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; margin: 24px 0;">');
  html = html.replace(/^\[\/risk-grid\]/gim, '</div>');

  html = html.replace(/^\[strategy-grid\]/gim, '<div class="strategy-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 24px 0;">');
  html = html.replace(/^\[\/strategy-grid\]/gim, '</div>');

  // Render [stat-card: green/amber/red/blue | Label | Value | Subtitle | BadgeText]
  html = html.replace(/\[stat-card:\s*(green|amber|red|blue)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^\]]+)\]/gi, (match, color, label, val, sub, badge) => {
    return `
      <div class="stat-card ${color.trim()}">
        <div class="sc-label">${label.trim()}</div>
        <div class="sc-val">${val.trim()}</div>
        <div class="sc-sub">${sub.trim()}</div>
        <span class="sc-badge badge-${color.trim()}">${badge.trim()}</span>
      </div>
    `;
  });

  // Render [risk-card: high/med/low | Title | Body]
  html = html.replace(/\[risk-card:\s*(high|med|low)\s*\|\s*([^|]+)\s*\|\s*([^\]]+)\]/gi, (match, level, title, body) => {
    return `
      <div class="risk-card ${level.trim()}">
        <div class="risk-head">
          <span class="risk-name">⚠️ ${title.trim()}</span>
          <span class="risk-level">${level.trim().toUpperCase()}</span>
        </div>
        <div class="risk-body">${body.trim()}</div>
      </div>
    `;
  });

  // Render [strategy-card: Horizon | Action | Entry | Target | Stop | Risk/Reward | Confidence(0-100)]
  html = html.replace(/\[strategy-card:\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^\]]+)\]/gi, (match, horizon, action, entry, target, stop, rr, conf) => {
    return `
      <div class="strat-card">
        <div class="strat-horizon">${horizon.trim()}</div>
        <div class="strat-action">${action.trim()}</div>
        <div class="strat-row"><span class="strat-key">Entry</span><span class="strat-v">${entry.trim()}</span></div>
        <div class="strat-row"><span class="strat-key">Target</span><span class="strat-v green">${target.trim()}</span></div>
        <div class="strat-row"><span class="strat-key">Stop Loss</span><span class="strat-v" style="color:var(--red)">${stop.trim()}</span></div>
        <div class="strat-row"><span class="strat-key">Risk/Reward</span><span class="strat-v">${rr.trim()}</span></div>
        <div class="strat-conf">
          <div class="conf-label">Confidence</div>
          <div class="conf-bar"><div class="conf-fill" style="width:${conf.trim()}%"></div></div>
          <div style="font-size:.72rem;color:var(--txt-muted);margin-top:4px">${conf.trim()}% Confidence</div>
        </div>
      </div>
    `;
  });

  return html;
}

/* ─── ENGINE CONTROLLERS ─────────────────────────────────── */
function processConversion() {
  const mdText = document.getElementById('markdown-input').value;
  
  // Apply pre-processing for cyber shortcuts
  const preProcessedMd = parseCyberShortcodes(mdText);
  
  // Convert standard markdown structures
  const parsedHtml = marked.parse(preProcessedMd);
  
  // Render output
  document.getElementById('visual-preview').innerHTML = parsedHtml;
  document.getElementById('html-code').value = parsedHtml;
}

function switchTab(tabType) {
  document.getElementById('tab-prev').classList.remove('active');
  document.getElementById('tab-code').classList.remove('active');
  
  if (tabType === 'prev') {
    document.getElementById('tab-prev').classList.add('active');
    document.getElementById('visual-preview').style.display = 'block';
    document.getElementById('html-code').style.display = 'none';
  } else {
    document.getElementById('tab-code').classList.add('active');
    document.getElementById('visual-preview').style.display = 'none';
    document.getElementById('html-code').style.display = 'block';
  }
}

function copyGeneratedHTML() {
  const codeBox = document.getElementById('html-code');
  codeBox.select();
  document.execCommand('copy');
  alert('HTML kod panoya kopyalandı! / HTML code copied to clipboard!');
}

function switchLanguage(lang) {
  // Update button states
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelector(`[onclick="switchLanguage('${lang}')"]`).classList.add('active');
  
  // Load template
  document.getElementById('markdown-input').value = templates[lang];
  processConversion();
}

function loadTemplate() {
  const activeLang = document.querySelector('.lang-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1];
  document.getElementById('markdown-input').value = templates[activeLang || 'tr'];
  processConversion();
}

// Initialize on page load
document.addEventListener("DOMContentLoaded", () => {
