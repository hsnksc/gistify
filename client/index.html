    <title>Gistify</title>
    <script>
      (function () {
        const siteUrl = "https://gistify.pro";
        const storageKey = "app_language";
        const pathname = window.location.pathname || "/";
        const match = pathname.match(/^\/(tr|en)(?=\/|$)/i);

        let storedLanguage = "";
        try {
          storedLanguage = window.localStorage.getItem(storageKey) || "";
        } catch {}

        const language = match
          ? match[1].toLowerCase()
          : storedLanguage === "en"
            ? "en"
            : "tr";
        const description =
          language === "en"
            ? "Gistify unifies earnings, momentum, macro and market research in one finance workspace."
            : "Gistify kazanc, momentum, makro ve piyasa arastirmasini tek finance workspace icinde toplar.";
        const absoluteUrl = `${window.location.origin || siteUrl}${pathname}${window.location.search || ""}`;

        document.documentElement.lang = language;

        const setMeta = (selector, content) => {
          const node = document.head.querySelector(selector);
          if (node && content) {
            node.setAttribute("content", content);
          }
        };

        const ensureLink = (rel, hreflang) => {
          const selector = hreflang
            ? `link[rel="${rel}"][hreflang="${hreflang}"]`
            : `link[rel="${rel}"]`;
          let node = document.head.querySelector(selector);
          if (!node) {
            node = document.createElement("link");
            node.setAttribute("rel", rel);
            if (hreflang) {
              node.setAttribute("hreflang", hreflang);
            }
            document.head.appendChild(node);
          }
          return node;
        };

        document.title = "Gistify";
        setMeta('meta[name="description"]', description);
        setMeta('meta[property="og:title"]', "Gistify");
        setMeta('meta[property="og:description"]', description);
        setMeta('meta[property="og:url"]', absoluteUrl);
        setMeta('meta[name="twitter:title"]', "Gistify");
        setMeta('meta[name="twitter:description"]', description);

        ensureLink("canonical").setAttribute("href", absoluteUrl);
        ensureLink("alternate", "tr").setAttribute(
          "href",
          `${siteUrl}/tr${pathname.replace(/^\/(?:tr|en)(?=\/|$)/i, "") || ""}`
        );
        ensureLink("alternate", "en").setAttribute(
          "href",
          `${siteUrl}/en${pathname.replace(/^\/(?:tr|en)(?=\/|$)/i, "") || ""}`
        );
        ensureLink("alternate", "x-default").setAttribute(
          "href",
          `${siteUrl}/tr${pathname.replace(/^\/(?:tr|en)(?=\/|$)/i, "") || ""}`
        );
      })();
    </script>
